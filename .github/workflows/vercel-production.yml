# Deploy LetMeHelpYouREALTY/skyesummithomes to Vercel production.
# Uses local `vercel build` + `deploy --prebuilt` so vercel.json "framework": null
# applies (dashboard is still preset to Next.js, which breaks remote-only builds).

name: Deploy to Vercel (production)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-production-skyesummithomes
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_EIbjFXaDDtGMTweb5Hvo3CG3
      VERCEL_PROJECT_ID: prj_x5YkBzbd8OFKPbnKslImQEbaYuUT
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Build Vercel output (respects vercel.json framework null)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::Add VERCEL_TOKEN to GitHub repo secrets (LetMeHelpYouREALTY/skyesummithomes)."
            exit 1
          fi
          npx vercel@54 build --prod --yes --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt to production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel@54 deploy --prebuilt --prod --yes --token="$VERCEL_TOKEN"
